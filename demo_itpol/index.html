<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
<nav class="navbar">
    <div class="navbar__container">
        <a href="index.html" id="navbar__logo">
            <img src="zdjecia/logox2.png" alt="Logo ITPOL" id="logo-img">
        </a>
        <div class="navbar__toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <ul class="navbar__menu">
            <li class="navbar__item"><a href="index.html" class="navbar__links">Home</a></li>
            <li class="navbar__item"><a href="#" class="navbar__links">Zlecenia</a></li>
            <li class="navbar__item"><a href="#" class="navbar__links">Zarządzanie</a></li>
            <li class="navbar__item"><a href="#" class="navbar__links">Kalendarz</a></li>
            <li class="navbar__item"><a href="#" class="navbar__links">Klienci</a></li>
            <li class="navbar__item"><a href="#" class="navbar__links">Magazyn</a></li>
            <li class="navbar__item"><a href="#" class="navbar__links">Ustawienia konta</a></li>
        </ul>
    </div>
</nav>



    <div class="main">
        <div class="main__container">
            <div class="main__content">
                <h1>ITPOL</h1>
                <h2>Zaloguj się lub zarejestruj</h2>
                <p>Strona administracyjna, zaloguj się lub zarejestruj, aby uzyskać dostęp do usług pracownika</p>
                
                <h3>Logowanie</h3>
                <form action="#" method="POST">
                    <input type="email" name="email" placeholder="E-mail" required>
                    <input type="password" name="password" placeholder="Hasło" required>
                    <button type="submit" class="main__btn">Zaloguj się</button>
                </form>
                
                <h3>Rejestracja</h3>
                <form action="#" method="POST">
                    <input type="text" name="imie" placeholder="Imię" required>
                    <input type="text" name="nazwisko" placeholder="Nazwisko" required>
                    <input type="email" name="email" placeholder="E-mail" required>
                    <input type="password" name="password" placeholder="Hasło" required>
                    <button type="submit" name="register" class="main__btn">Zarejestruj się</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="menu.js"></script>
</body>
</html>
